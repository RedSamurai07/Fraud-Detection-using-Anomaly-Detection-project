name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python 3.9
      uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov httpx

    - name: Create stub creditcard.csv
      run: |
        python - <<'EOF'
        import numpy as np, pandas as pd
        rng = np.random.default_rng(42)
        n = 200
        data = {f"V{i}": rng.standard_normal(n) for i in range(1, 29)}
        data["Time"]   = rng.uniform(0, 172800, n)
        data["Amount"] = rng.uniform(0.1, 500, n)
        data["Class"]  = [0]*190 + [1]*10
        pd.DataFrame(data).to_csv("creditcard.csv", index=False)
        print("Stub creditcard.csv created.")
        EOF

    - name: Run Tests with Coverage
      run: |
        pytest tests/ \
          --cov=main \
          --cov=train_model \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=85 \
          -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
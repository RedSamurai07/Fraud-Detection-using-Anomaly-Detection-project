name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true  # Important: Pull Git LFS files (your model)

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==2.1.3 scikit-learn==1.6.1 joblib
          pip install fastapi uvicorn pydantic httpx pytest pandas

      - name: Run tests
        run: pytest test_api.py -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - name: Build Docker image
        run: docker build -t fraud-detection-api:latest .
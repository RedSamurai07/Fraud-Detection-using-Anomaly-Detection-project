version: '3.8'

services:
  # Fraud Detection API
  fraud-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fraud-detection-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MODEL_DIR=/app/models
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    volumes:
      - ../models:/app/models
    depends_on:
      - mlflow
    networks:
      - fraud-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MLflow Tracking Server
  mlflow:
    image: python:3.9-slim
    container_name: mlflow-server
    ports:
      - "5001:5001"
    volumes:
      - ../mlruns:/mlruns
      - ../mlflow:/app
    working_dir: /app
    command: >
      bash -c "pip install mlflow scikit-learn pandas numpy &&
               mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri file:///mlruns"
    networks:
      - fraud-network
    restart: unless-stopped

networks:
  fraud-network:
    driver: bridge

volumes:
  mlruns:
  models: